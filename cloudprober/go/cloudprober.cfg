# OpenStack API Health Monitoring — cloudprober configuration (Go probe)
#
# Required environment variables:
#   OS_AUTH_URL              Keystone v3 endpoint  (e.g. http://keystone:5000/v3)
#   OS_USERNAME              Service-account username
#   OS_PASSWORD              Service-account password
#   OS_PROJECT_NAME          Scoping project
#   OS_USER_DOMAIN_NAME      User domain (default: Default)
#   OS_PROJECT_DOMAIN_NAME   Project domain (default: Default)
#   OS_REGION_NAME           Region label appended to all metrics (default: RegionOne)
#
# Optional — set to enable the corresponding service probe:
#   OS_NOVA_URL              Nova API base URL    (e.g. http://nova:8774/v2.1)
#   OS_NEUTRON_URL           Neutron API base URL (e.g. http://neutron:9696/v2.0)
#   OS_GLANCE_URL            Glance API base URL  (e.g. http://glance:9292/v2)
#   OS_CINDER_URL            Cinder API base URL  (e.g. http://cinder:8776/v3)
#
# The Go probe binary is compiled from scripts/probe.go at image build time
# and placed at /scripts/probe.
#
# Metrics are exposed on :9313/metrics (Prometheus format).

# ── Keystone / Identity ──────────────────────────────────────────────────────
probe {
  name: "openstack_identity"
  type: EXTERNAL
  targets {
    endpoint { name: "keystone" }
  }
  external_probe {
    mode: ONCE
    command: "/scripts/probe identity"
  }
  interval_msec: 60000
  timeout_msec: 15000
  additional_label {
    key: "service"
    value: "identity"
  }
  additional_label {
    key: "region"
    value: "@{OS_REGION_NAME:RegionOne}"
  }
}

