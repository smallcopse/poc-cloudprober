name: Build and push poc-cloudprober to GHCR

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  CLOUDPROBER_VERSION: v0.13.6

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set build date
        id: vars
        run: |
          echo "build_date=$(date -u +%Y%m%d-%H%M)" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v4
        with:
          context: ./cloudprober
          file: ./cloudprober/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository_owner }}/poc-cloudprober:${{ env.CLOUDPROBER_VERSION }}-${{ steps.vars.outputs.build_date }}
            ghcr.io/${{ github.repository_owner }}/poc-cloudprober:latest
          build-args: |
            CLOUDPROBER_VERSION=${{ env.CLOUDPROBER_VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
