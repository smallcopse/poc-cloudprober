name: Build and push poc-cloudprober to GHCR

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  CLOUDPROBER_VERSION: v0.14.3

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - variant: go
            context: ./cloudprober/go
            extra_build_args: "GO_VERSION=1.26"
          - variant: python
            context: ./cloudprober/python
            extra_build_args: ""
          - variant: bash
            context: ./cloudprober/bash
            extra_build_args: ""

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set build date
        id: vars
        run: |
          echo "build_date=$(date -u +%Y%m%d-%H%M)" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-arch image (${{ matrix.variant }})
        uses: docker/build-push-action@v4
        with:
          context: ${{ matrix.context }}
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository_owner }}/poc-cloudprober-${{ matrix.variant }}:${{ env.CLOUDPROBER_VERSION }}-${{ steps.vars.outputs.build_date }}
            ghcr.io/${{ github.repository_owner }}/poc-cloudprober-${{ matrix.variant }}:latest
          build-args: |
            CLOUDPROBER_VERSION=${{ env.CLOUDPROBER_VERSION }}
            ${{ matrix.extra_build_args }}
          cache-from: type=gha,scope=${{ matrix.variant }}
          cache-to: type=gha,mode=max,scope=${{ matrix.variant }}
